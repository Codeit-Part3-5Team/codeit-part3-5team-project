# config.yaml — RAG 검색 설정 (팀 공용 / git 추적)
# 비밀값(OPENAI_API_KEY)은 여기 두지 말고 .env에 둡니다.
# 경로는 개인마다 다를 수 있어, .env에 같은 이름 환경변수(CHUNKS_PATH 등)를
# 적으면 이 값보다 우선 적용됩니다. (우선순위: .env > config.yaml)

paths:
  faiss_index: data/faiss_index                       # FAISS 인덱스 저장/로드 위치
  chunks: data/processed/chunks_v1_enriched.json      # 청크 JSON (인덱스 빌드 시)

retriever:
  mmr_k: 5            # 최종 반환 청크 수
  mmr_fetch_k: 20     # MMR 후보 풀 크기
  mmr_lambda: 0.5     # 관련성 vs 다양성 (1=관련성만, 0=다양성만)
  fuzzy_threshold: 80 # agency 별칭 fuzzy 매칭 임계값 (0~100)

embedding:
  model: text-embedding-3-small   # 인덱스는 이 모델로 빌드됨. 바꾸면 인덱스 재생성 필요

masking:
  business_number: true        # 사업자등록번호: ON
  corporate_number: true       # 법인등록번호: ON
  phone: true                  # 전화번호: ON
  email: true                  # 이메일: ON
  person_name: false           # 담당자 인명: OFF (정책 결정)
  person_name_policy_ref: "정보공개법 제9조 단서, 2026-06-XX 팀 결정"