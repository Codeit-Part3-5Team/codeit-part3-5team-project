name: 🐛 버그 리포트
description: 예상과 다르게 동작하는 문제를 제보합니다.
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: 버그 설명
      description: 어떤 문제가 발생했는지 설명해주세요.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 재현 방법
      description: 버그를 재현하는 최소 단계를 작성해주세요.
      placeholder: |
        1. `python scripts/train.py ...` 실행
        2. ...
        3. 에러 발생
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 예상 동작
    validations:
      required: true

  - type: textarea
    id: error_log
    attributes:
      label: 에러 로그 / 스크린샷
      render: shell

  - type: input
    id: environment
    attributes:
      label: 실행 환경
      placeholder: "예: WSL2 Ubuntu 24.04 / RTX 5050 / Python 3.10 / ultralytics 8.3.x"
